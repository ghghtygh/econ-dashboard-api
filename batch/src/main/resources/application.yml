spring:
  profiles:
    active: dev

  application:
    name: econ-dashboard-batch

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

fred:
  api-key: ${FRED_API_KEY:}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

collector:
  retry:
    max-attempts: 3
    initial-interval-ms: 2000
    multiplier: 2.0
    max-interval-ms: 10000
  alert:
    failure-threshold: 3
    webhook-url: ${COLLECTOR_ALERT_WEBHOOK_URL:}

logging:
  level:
    com.econdashboard: DEBUG
