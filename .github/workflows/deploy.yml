name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: econ-api

jobs:
  build-and-deploy:
    runs-on: [self-hosted, econ-api]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle 빌드
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar --no-daemon -x test

      - name: Docker 이미지 빌드
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: 기존 컨테이너 중지
        run: |
          docker stop econ-api || true
          docker rm econ-api || true

      - name: 컨테이너 실행
        run: |
          docker run -d \
            --name econ-api \
            --network econ-network \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
            -e REDIS_PORT=${{ secrets.REDIS_PORT }} \
            -e REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest

      - name: 헬스체크
        run: |
          echo "API 시작 대기 중..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "API 정상 기동 확인"
              exit 0
            fi
            sleep 2
          done
          echo "헬스체크 실패"
          docker logs econ-api --tail 50
          exit 1

      - name: 배포 실패 시 롤백
        if: failure()
        run: |
          echo "배포 실패 - 이전 버전으로 롤백"
          docker stop econ-api || true
          docker rm econ-api || true
          PREV_IMAGE=$(docker images ${{ env.IMAGE_NAME }} --format '{{.Tag}}' | grep -v latest | head -1)
          if [ -n "$PREV_IMAGE" ]; then
            docker run -d \
              --name econ-api \
              --network econ-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
              -e REDIS_PORT=${{ secrets.REDIS_PORT }} \
              -e REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:${PREV_IMAGE}
          fi
