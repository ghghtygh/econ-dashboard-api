name: QA Agent - 빌드/테스트 검증

on:
  pull_request_review:
    types: [submitted]

jobs:
  qa:
    if: >
      github.event.review.state == 'approved' &&
      contains(github.event.pull_request.labels.*.name, 'auto-dev')
    runs-on: [self-hosted, econ-api]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle 빌드 + 테스트
        id: build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build 2>&1 | tee /tmp/build-output.txt
          echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Claude Code로 QA 분석
        run: |
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }})
          BUILD_LOG=$(tail -100 /tmp/build-output.txt)
          TEST_RESULTS=""
          if [ -d "build/reports/tests" ]; then
            TEST_RESULTS=$(find build/reports/tests -name "*.xml" -exec cat {} \; 2>/dev/null | head -200)
          fi

          QA_REPORT=$(claude -p "
          당신은 QA 엔지니어입니다.
          빌드/테스트 결과를 분석하고 QA 리포트를 작성하세요.

          ## 빌드 로그 (마지막 100줄)
          ${BUILD_LOG}

          ## 테스트 결과
          ${TEST_RESULTS}

          ## PR 변경사항
          ${PR_DIFF}

          ## 분석 항목
          1. 빌드 성공 여부
          2. 테스트 통과 여부 및 실패 원인 분석
          3. 누락된 테스트 케이스 제안
          4. 통합 시 리스크 분석

          ## 출력 형식
          최종 판정: ✅ MERGE_READY 또는 ❌ NOT_READY 를 명시하세요.
          " --allowedTools "Read,Glob,Grep")

          echo "$QA_REPORT" > /tmp/qa-report.txt

          if echo "$QA_REPORT" | grep -q "MERGE_READY"; then
            echo "QA_RESULT=pass" >> $GITHUB_ENV
          else
            echo "QA_RESULT=fail" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: QA 리포트 코멘트
        run: |
          QA_BODY=$(cat /tmp/qa-report.txt)

          if [ "$QA_RESULT" = "pass" ]; then
            EMOJI="✅"
            STATUS="MERGE READY"
          else
            EMOJI="❌"
            STATUS="NOT READY"
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(cat <<EOF
          ## ${EMOJI} QA Agent 리포트 - ${STATUS}

          ${QA_BODY}

          ---
          🤖 Generated by QA Agent (Claude Code)
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
