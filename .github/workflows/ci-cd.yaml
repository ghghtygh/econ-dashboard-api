name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      batch: ${{ steps.changes.outputs.batch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # core 또는 infra 변경 시 둘 다 빌드
          if echo "$CHANGED" | grep -qE '^(core|infra|build\.gradle\.kts|settings\.gradle\.kts)/?' ; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "batch=true" >> $GITHUB_OUTPUT
          else
            if echo "$CHANGED" | grep -qE '^api-app/' ; then
              echo "api=true" >> $GITHUB_OUTPUT
            else
              echo "api=false" >> $GITHUB_OUTPUT
            fi
            if echo "$CHANGED" | grep -qE '^batch/' ; then
              echo "batch=true" >> $GITHUB_OUTPUT
            else
              echo "batch=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :api-app:bootJar --no-daemon -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ghghtygh/econ-dashboard-api:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/ghghtygh/econ-dashboard-api:latest

  build-batch:
    needs: detect-changes
    if: needs.detect-changes.outputs.batch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :batch:bootJar --no-daemon -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: batch/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ghghtygh/econ-dashboard-batch:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/ghghtygh/econ-dashboard-batch:latest

  update-manifest:
    needs: [detect-changes, build-api, build-batch]
    if: always() && (needs.build-api.result == 'success' || needs.build-batch.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout k8s-manifests
        uses: actions/checkout@v4
        with:
          repository: ghghtygh/k8s-manifests
          token: ${{ secrets.K8S_MANIFESTS_PAT }}

      - name: Update deployment image tags
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short }}
          API_BUILT="${{ needs.build-api.result }}"
          BATCH_BUILT="${{ needs.build-batch.result }}"

          if [ "$API_BUILT" == "success" ]; then
            sed -i "s|image: ghcr.io/ghghtygh/econ-dashboard-api:.*|image: ghcr.io/ghghtygh/econ-dashboard-api:${SHORT_SHA}|" apps/econ-api/deployment.yaml
          fi
          if [ "$BATCH_BUILT" == "success" ]; then
            sed -i "s|image: ghcr.io/ghghtygh/econ-dashboard-batch:.*|image: ghcr.io/ghghtygh/econ-dashboard-batch:${SHORT_SHA}|" apps/econ-batch/deployment.yaml
          fi

          # api와 batch 동시 배포 시 → batch Flyway 비활성화 (api에서만 실행)
          # batch만 배포 시 → batch Flyway 활성화
          if [ "$API_BUILT" == "success" ] && [ "$BATCH_BUILT" == "success" ]; then
            sed -i 's|value: "true"  # FLYWAY|value: "false"  # FLYWAY|' apps/econ-batch/deployment.yaml
          elif [ "$BATCH_BUILT" == "success" ]; then
            sed -i 's|value: "false"  # FLYWAY|value: "true"  # FLYWAY|' apps/econ-batch/deployment.yaml
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update econ images to ${{ steps.sha.outputs.short }}"
          git push
