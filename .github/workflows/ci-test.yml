name: CI - 빌드 및 테스트

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    name: 단위 테스트 + ArchUnit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 빌드 (테스트 제외)
        run: |
          chmod +x ./gradlew
          ./gradlew classes testClasses --no-daemon

      - name: 단위 테스트 실행
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 테스트 결과 리포트
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 테스트 결과
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: 테스트 실패 시 PR 코멘트
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('@actions/glob');

            let failedTests = [];
            const globber = await glob.create('**/build/test-results/test/*.xml');
            for await (const file of globber.globGenerator()) {
              const content = fs.readFileSync(file, 'utf8');
              const failures = content.match(/testcase.*?name="(.*?)".*?classname="(.*?)"[\s\S]*?<failure/g);
              if (failures) {
                failures.forEach(f => {
                  const name = f.match(/name="(.*?)"/)?.[1];
                  const cls = f.match(/classname="(.*?)"/)?.[1];
                  if (name && cls) failedTests.push(`- \`${cls}.${name}\``);
                });
              }
            }

            const body = `## ❌ 테스트 실패

            ${failedTests.length > 0 ? '### 실패한 테스트\n' + failedTests.join('\n') : '테스트 결과를 파싱할 수 없습니다.'}

            [전체 로그 확인](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
