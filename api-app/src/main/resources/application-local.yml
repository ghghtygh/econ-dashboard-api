spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/econdashboard
    username: ${DB_USERNAME:econdashboard}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: simple

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

management:
  health:
    redis:
      enabled: false

logging:
  level:
    com.econdashboard: DEBUG
    org.hibernate.SQL: DEBUG
